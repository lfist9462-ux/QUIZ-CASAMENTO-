<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>João & Adriana ❤️</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- =========================
       TELA INICIAL
  ========================== -->

  <section id="inicio">

    <div class="capa">

      <div class="arte-capa">

        <!-- ÁREA DO NOME -->
        <div class="area-nome">

          <div class="icone-pessoa">
            ♙
          </div>

          <input
            type="text"
            id="nomeJogador"
            placeholder="Digite seu nome"
            autocomplete="off"
          >

        </div>


        <!-- BOTÃO -->
        <button
          class="botao-quiz"
          onclick="iniciarQuiz()"
        >

          <span>🌿</span>

          COMEÇAR O QUIZ

          <span>🌿</span>

        </button>

      </div>

    </div>

  </section>


  <!-- =========================
       QUIZ
  ========================== -->

  <section id="quiz">

    <p id="progresso"></p>

    <h2 id="pergunta"></h2>

    <div id="alternativas"></div>

  </section>


  <!-- =========================
       RESULTADO
  ========================== -->

  <section id="resultado">

    <h1 id="tituloResultado">
      Quiz finalizado ❤️
    </h1>

    <p id="pontuacao"></p>

    <button onclick="voltarInicio()">
      🔄 Jogar novamente
    </button>

  </section>


  <script>

    /* =========================
       PERGUNTAS
    ========================= */

    const perguntas = [

      {
        pergunta: "Onde João e Adriana se conheceram?",
        alternativas: [
          "No trabalho",
          "Na escola",
          "Em uma festa",
          "Pela internet"
        ],
        correta: 0
      },

      {
        pergunta: "Quem costuma comer mais?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois por igual"
        ],
        correta: 0
      },

      {
        pergunta: "Quem costuma esquecer mais as coisas?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem pediu em casamento?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Qual lugar vocês mais sonham em conhecer juntos?",
        alternativas: [
          "Paris",
          "Japão",
          "Nova York"
        ],
        correta: 1
      },

      {
        pergunta: "Quantos filhos vocês sonham em ter?",
        alternativas: [
          "1",
          "2",
          "3"
        ],
        correta: 1
      },

      {
        pergunta: "Onde João pediu Adriana em casamento?",
        alternativas: [
          "Em um café",
          "No Café Oliva",
          "No Mais Um Café",
          "No Ermida Dom Bosco"
        ],
        correta: 3
      },

      {
        pergunta: "Quem costuma acordar mais cedo?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Quem faz mais piada?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem é o mais romântico?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem costuma fazer mais surpresa?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem demora mais para decidir o que vai comer?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem canta mais alto no carro?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem escolhe o filme ou série para assistir?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Quem é mais competitivo?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem é mais provável de esquecer uma data importante?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem disse 'eu te amo' primeiro?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Quem é mais provável de querer viajar de última hora?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem é mais provável de fazer uma compra por impulso?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem é mais provável de esquecer onde colocou alguma coisa?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      }

    ];


    let perguntaAtual = 0;

    let pontuacao = 0;

    let nomeJogador = "";


    /* =========================
       INICIAR QUIZ
    ========================== */

    function iniciarQuiz() {

      nomeJogador =
        document
        .getElementById("nomeJogador")
        .value
        .trim();


      if (nomeJogador === "") {

        alert("Digite seu nome para começar o quiz ❤️");

        return;

      }


      document
      .getElementById("inicio")
      .style
      .display = "none";


      document
      .getElementById("quiz")
      .style
      .display = "block";


      perguntaAtual = 0;

      pontuacao = 0;

      mostrarPergunta();

    }


    /* =========================
       MOSTRAR PERGUNTA
    ========================== */

    function mostrarPergunta() {

      const pergunta =
        perguntas[perguntaAtual];


      document
      .getElementById("progresso")
      .textContent =
        `Pergunta ${perguntaAtual + 1} de ${perguntas.length}`;


      document
      .getElementById("pergunta")
      .textContent =
        pergunta.pergunta;


      const alternativas =
        document
        .getElementById("alternativas");


      alternativas.innerHTML = "";


      pergunta.alternativas.forEach(

        (alternativa, indice) => {


          const botao =
            document.createElement("button");


          botao.textContent =
            alternativa;


          botao.onclick = function() {


            if (
              indice ===
              pergunta.correta
            ) {

              pontuacao++;

            }


            perguntaAtual++;


            if (
              perguntaAtual <
              perguntas.length
            ) {

              mostrarPergunta();

            }

            else {

              mostrarResultado();

            }

          };


          alternativas.appendChild(botao);

        }

      );

    }


    /* =========================
       RESULTADO
    ========================== */

    function mostrarResultado() {

      document
      .getElementById("quiz")
      .style
      .display = "none";


      document
      .getElementById("resultado")
      .style
      .display = "flex";


      let titulo = "";

      let mensagem = "";


      if (
        pontuacao === 20
      ) {

        titulo =
          `Você acertou 20/20! 😍❤️`;

        mensagem =
          `Parabéns, ${nomeJogador}! Você conhece nossa história de um jeito incrível! Já pode dizer que é especialista em João & Adriana! 💍✨`;

      }

      else if (
        pontuacao >= 17
      ) {

        titulo =
          `Você acertou ${pontuacao}/20! 🥰`;

        mensagem =
          `Parabéns, ${nomeJogador}! Você conhece muito bem a nossa história! ❤️✨`;

      }

      else if (
        pontuacao >= 14
      ) {

        titulo =
          `Você acertou ${pontuacao}/20! 😍`;

        mensagem =
          `Muito bem, ${nomeJogador}! Você conhece bastante a nossa história! ❤️`;

      }

      else if (
        pontuacao >= 10
      ) {

        titulo =
          `Você acertou ${pontuacao}/20! 😊`;

        mensagem =
          `Foi bem, ${nomeJogador}! Ainda temos algumas histórias para você descobrir! ❤️`;

      }

      else {

        titulo =
          `Você acertou ${pontuacao}/20! 😄`;

        mensagem =
          `${nomeJogador}, ainda temos muito para você conhecer sobre a história de João & Adriana! ❤️`;

      }


      document
      .getElementById("tituloResultado")
      .textContent = titulo;


      document
      .getElementById("pontuacao")
      .textContent = mensagem;

    }


    /* =========================
       VOLTAR
    ========================== */

    function voltarInicio() {

      document
      .getElementById("resultado")
      .style
      .display = "none";


      document
      .getElementById("inicio")
      .style
      .display = "flex";


      document
      .getElementById("nomeJogador")
      .value = "";

    }

  </script>

</body>

</html>
