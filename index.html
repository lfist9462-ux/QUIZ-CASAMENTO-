<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>João & Adriana ❤️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================
       TELA INICIAL
  ========================== -->

  <section id="inicio">

    <div class="capa">

      <img src="IMG_2431.png" alt="João e Adriana">

      <div class="fita">
        <span>♥</span>
      </div>

      <div class="painel">

        <div class="subtitulo">
          Nossa história, nosso amor ❤️
        </div>

        <div class="linha">
          <span></span>
          ♥
          <span></span>
        </div>

        <h1>João & Adriana</h1>

        <div class="coracao">
          ♥
        </div>

        <p class="data">
          03 de agosto de 2026
        </p>

        <div class="divisoria"></div>

        <p class="descricao">
          Descubra o quanto você conhece a nossa história!
        </p>

        <!-- CAMPO DO NOME -->

        <input
          type="text"
          id="nomeParticipante"
          placeholder="Digite seu nome"
          maxlength="40"
        >

        <button onclick="iniciarQuiz()">
          ✨ Começar o Quiz
        </button>

      </div>

    </div>

  </section>


  <!-- =========================
       QUIZ
  ========================== -->

  <section id="quiz">

    <p id="progresso"></p>

    <h2 id="pergunta"></h2>

    <div id="alternativas"></div>

  </section>


  <!-- =========================
       RESULTADO FINAL
  ========================== -->

  <section id="resultado">

    <h1 id="tituloResultado">
      Quiz finalizado ❤️
    </h1>

    <p id="pontuacao"></p>

    <button onclick="voltarInicio()">
      🔄 Voltar ao início
    </button>

  </section>


  <script>

    /* =========================
       LINK DO GOOGLE APPS SCRIPT
    ========================== */

    const URL_RANKING =
      "https://script.google.com/macros/s/AKfycbzuW5IcXg22mawTj49YJ2dFfQI57SdLY7d0jvQ_U3CdHD1Xph2uF8ZVJ3iSk8_TnbMR/exec";


    /* =========================
       PERGUNTAS
    ========================== */

    const perguntas = [

      {
        pergunta: "Onde João e Adriana se conheceram?",
        alternativas: [
          "No trabalho",
          "Na escola",
          "Em uma festa",
          "Pela internet"
        ],
        correta: 0
      },

      {
        pergunta: "Quem costuma comer mais?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois por igual"
        ],
        correta: 0
      },

      {
        pergunta: "Quem costuma esquecer mais as coisas?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem pediu em casamento?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Qual lugar vocês mais sonham em conhecer juntos?",
        alternativas: [
          "Paris",
          "Japão",
          "Nova York"
        ],
        correta: 1
      },

      {
        pergunta: "Quantos filhos vocês sonham em ter?",
        alternativas: [
          "1",
          "2",
          "3"
        ],
        correta: 1
      },

      {
        pergunta: "Onde João pediu Adriana em casamento?",
        alternativas: [
          "Em um café",
          "No Café Oliva",
          "No Mais Um Café",
          "No Ermida Dom Bosco"
        ],
        correta: 3
      },

      {
        pergunta: "Quem costuma acordar mais cedo?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Quem faz mais piada?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem é o mais romântico?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem costuma fazer mais surpresa?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem demora mais para decidir o que vai comer?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem canta mais alto no carro?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      },

      {
        pergunta: "Quem escolhe o filme ou série para assistir?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Quem é mais competitivo?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem é mais provável de esquecer uma data importante?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem disse 'eu te amo' primeiro?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois juntos"
        ],
        correta: 0
      },

      {
        pergunta: "Quem é mais provável de querer viajar de última hora?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem é mais provável de fazer uma compra por impulso?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 1
      },

      {
        pergunta: "Quem é mais provável de esquecer onde colocou alguma coisa?",
        alternativas: [
          "João",
          "Adriana",
          "Os dois"
        ],
        correta: 0
      }

    ];


    /* =========================
       VARIÁVEIS
    ========================== */

    let perguntaAtual = 0;

    let pontuacao = 0;

    let nomeParticipante = "";


    /* =========================
       INICIAR QUIZ
    ========================== */

    function iniciarQuiz() {

      const nome =
        document
          .getElementById("nomeParticipante")
          .value
          .trim();


      if (nome === "") {

        alert("Por favor, digite seu nome antes de começar ❤️");

        return;

      }


      // VERIFICA SE ESTE CELULAR JÁ RESPONDEU

      if (
        localStorage.getItem("quizCasamentoRespondido") === "true"
      ) {

        alert(
          "Este celular já respondeu ao quiz ❤️"
        );

        return;

      }


      nomeParticipante = nome;


      document.getElementById("inicio").style.display =
        "none";


      document.getElementById("quiz").style.display =
        "block";


      document.getElementById("resultado").style.display =
        "none";


      perguntaAtual = 0;

      pontuacao = 0;


      mostrarPergunta();

    }


    /* =========================
       MOSTRAR PERGUNTA
    ========================== */

    function mostrarPergunta() {

      const pergunta =
        perguntas[perguntaAtual];


      document.getElementById("progresso").textContent =
        `Pergunta ${perguntaAtual + 1} de ${perguntas.length}`;


      document.getElementById("pergunta").textContent =
        pergunta.pergunta;


      const alternativas =
        document.getElementById("alternativas");


      alternativas.innerHTML = "";


      pergunta.alternativas.forEach(
        (alternativa, indice) => {


          const botao =
            document.createElement("button");


          botao.textContent =
            alternativa;


          botao.onclick =
            function () {


              if (
                indice === pergunta.correta
              ) {

                pontuacao++;

              }


              perguntaAtual++;


              if (
                perguntaAtual <
                perguntas.length
              ) {

                mostrarPergunta();

              }

              else {

                mostrarResultado();

              }

            };


          alternativas.appendChild(botao);

        }
      );

    }


    /* =========================
       ENVIAR RESULTADO PARA PLANILHA
    ========================== */

    function enviarResultado() {

      fetch(
        URL_RANKING,
        {

          method: "POST",

          mode: "no-cors",

          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },

          body: JSON.stringify({

            nome: nomeParticipante,

            pontuacao: pontuacao,

            total: perguntas.length

          })

        }

      );

    }


    /* =========================
       RESULTADO
    ========================== */

    function mostrarResultado() {


      // SALVA QUE ESTE CELULAR JÁ RESPONDEU

      localStorage.setItem(
        "quizCasamentoRespondido",
        "true"
      );


      // ENVIA PARA A PLANILHA

      enviarResultado();


      document.getElementById("quiz").style.display =
        "none";


      document.getElementById("resultado").style.display =
        "flex";


      let titulo = "";

      let mensagem = "";


      if (pontuacao === 20) {

        titulo =
          `${nomeParticipante}, você acertou 20/20! 😍❤️`;


        mensagem =
          "Parabéns! Você conhece nossa história de um jeito incrível! Já pode dizer que é especialista em João & Adriana! 💍✨";


      }

      else if (pontuacao >= 17) {

        titulo =
          `${nomeParticipante}, você acertou ${pontuacao}/20! 🥰`;


        mensagem =
          "Uau! Você conhece muito bem a nossa história! Está quase no nível especialista em João & Adriana! ❤️✨";


      }

      else if (pontuacao >= 14) {

        titulo =
          `${nomeParticipante}, você acertou ${pontuacao}/20! 😍`;


        mensagem =
          "Muito bem! Você conhece bastante a nossa história e sabe muitos detalhes sobre nós! ❤️";


      }

      else if (pontuacao >= 10) {

        titulo =
          `${nomeParticipante}, você acertou ${pontuacao}/20! 😊`;


        mensagem =
          "Foi bem! Mas ainda temos algumas histórias e detalhes para você descobrir sobre nós! ❤️";


      }

      else if (pontuacao >= 5) {

        titulo =
          `${nomeParticipante}, você acertou ${pontuacao}/20! 😄`;


        mensagem =
          "Ainda temos muito para conversar! Parece que precisamos contar nossa história com mais detalhes! ❤️";


      }

      else {

        titulo =
          `${nomeParticipante}, você acertou ${pontuacao}/20! 😂`;


        mensagem =
          "Eita! Parece que você precisa conhecer melhor a história de João & Adriana! Mas ainda dá tempo de aprender tudo! ❤️";

      }


      document.getElementById(
        "tituloResultado"
      ).textContent =
        titulo;


      document.getElementById(
        "pontuacao"
      ).textContent =
        mensagem;

    }


    /* =========================
       VOLTAR AO INÍCIO
    ========================== */

    function voltarInicio() {

      document.getElementById("resultado").style.display =
        "none";


      document.getElementById("quiz").style.display =
        "none";


      document.getElementById("inicio").style.display =
        "flex";


      perguntaAtual = 0;

      pontuacao = 0;

    }

  </script>

</body>

</html>
