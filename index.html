<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>João & Adriana ❤️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TELA INICIAL -->
  <section id="inicio">

    <div class="capa">

      <img src="IMG_2431.png" alt="João e Adriana">

      <div class="fita">
        <span>♥</span>
      </div>

      <div class="painel">

        <div class="subtitulo">
          Nossa história, nosso amor ❤️
        </div>

        <div class="linha">
          <span></span>
          ♥
          <span></span>
        </div>

        <h1>
          João & Adriana
        </h1>

        <div class="coracao">
          ♥
        </div>

        <p class="data">
          03 de agosto de 2026
        </p>

        <div class="divisoria"></div>

        <p class="descricao">
          Descubra o quanto você conhece a nossa história!
        </p>

        <input
          type="text"
          id="nomeJogador"
          placeholder="Digite seu nome"
          autocomplete="off">

        <button onclick="iniciarQuiz()">
          ✨ Começar o Quiz
        </button>

      </div>

    </div>

  </section>

  <!-- QUIZ -->
  <section id="quiz">

    <p id="progresso"></p>

    <h2 id="pergunta"></h2>

    <div id="alternativas"></div>

  </section>

  <!-- RESULTADO -->
  <section id="resultado">

    <h1 id="tituloResultado">
      Quiz finalizado ❤️
    </h1>

    <p id="pontuacao"></p>

  </section>

  <script src="script.js"></script>

</body>

</html>
